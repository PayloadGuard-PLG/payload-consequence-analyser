name: PayloadGuard
description: Scans a branch before merge and tells you exactly how badly it's going to hurt.
author: PayloadGuard-PLG

branding:
  icon: shield
  color: red

inputs:
  repo-token:
    description: GitHub token for posting PR comments
    required: false
    default: ${{ github.token }}
  pr-description:
    description: PR description for semantic transparency analysis — pass github.event.pull_request.body
    required: false
    default: ""
  save-markdown:
    description: Filename for the markdown report
    required: false
    default: payloadguard-report.md
  app-id:
    description: GitHub App ID for Check Run posting (optional)
    required: false
    default: ""
  private-key:
    description: GitHub App private key PEM contents for Check Run posting (optional)
    required: false
    default: ""
  installation-id:
    description: GitHub App installation ID for Check Run posting (optional)
    required: false
    default: ""
  auto-remediate:
    description: >
      Open a PR replacing mutable action tags with pinned SHAs.
      Requires pull-requests: write. Never commits directly to the scanned branch.
    required: false
    default: "false"
  runtime-mode:
    description: >
      eBPF runtime defence agent mode: disabled | audit | block.
      audit emits events to pg-runtime-events.json with no blocking.
      block terminates processes that match egress/ptrace/procmem policies.
      Requires a runner with CONFIG_KPROBES and CONFIG_FTRACE enabled.
      The agent degrades gracefully (exit 0) on unsupported kernels.
    required: false
    default: "disabled"
outputs:
  exit-code:
    description: "PayloadGuard exit code: 0=safe, 1=error, 2=destructive"
    value: ${{ steps.scan.outputs.exit_code }}
  report-path:
    description: Absolute path to the generated markdown report
    value: ${{ steps.scan.outputs.report_path }}
  json-report-path:
    description: Absolute path to the generated JSON report
    value: ${{ steps.scan.outputs.json_report_path }}
  verdict:
    description: "Verdict string: SAFE, REVIEW, CAUTION, or DESTRUCTIVE"
    value: ${{ steps.scan.outputs.verdict }}
  runtime-events-path:
    description: Path to pg-runtime-events.json (only set when runtime-mode != disabled)
    value: ${{ steps.runtime.outputs.events_path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Fetch base branch
      shell: bash
      run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

    - name: PayloadGuard Runtime Agent
      id: runtime
      if: inputs.runtime-mode != 'disabled'
      shell: bash
      run: |
        PG_VERSION=v2.0.0
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        EVENTS_PATH="${{ github.workspace }}/pg-runtime-events.json"
        curl -fsSL \
          "https://github.com/PayloadGuard-PLG/payload-consequence-analyser/releases/download/${PG_VERSION}/pg-agent-linux-${ARCH}" \
          -o /tmp/pg-agent && chmod +x /tmp/pg-agent
        sudo /tmp/pg-agent \
          --mode=${{ inputs.runtime-mode }} \
          --policy="${{ github.workspace }}/payloadguard-policy.yaml" \
          --out="${EVENTS_PATH}" &
        echo "events_path=${EVENTS_PATH}" >> "$GITHUB_OUTPUT"

    - name: Run PayloadGuard
      id: scan
      shell: bash
      env:
        PYTHONUTF8: "1"
        PG_PR_DESCRIPTION: ${{ inputs.pr-description }}
        REPORT_PATH: ${{ github.workspace }}/${{ inputs.save-markdown }}
        JSON_REPORT_PATH: ${{ github.workspace }}/payloadguard-report.json
      run: |
        set +e
        python "${{ github.action_path }}/analyze.py" . \
          "${{ github.head_ref }}" "${{ github.base_ref }}" \
          --pr-description "$PG_PR_DESCRIPTION" \
          --save-markdown "$REPORT_PATH" \
          --save-json "$JSON_REPORT_PATH"
        EXIT=$?
        echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
        echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        echo "json_report_path=$JSON_REPORT_PATH" >> "$GITHUB_OUTPUT"
        case $EXIT in
          0) echo "verdict=SAFE"        >> "$GITHUB_OUTPUT" ;;
          2) echo "verdict=DESTRUCTIVE" >> "$GITHUB_OUTPUT" ;;
          *) echo "verdict=ERROR"       >> "$GITHUB_OUTPUT" ;;
        esac

    - name: Post PR comment
      if: always()
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
      env:
        REPORT_PATH: ${{ steps.scan.outputs.report_path }}
        GITHUB_TOKEN: ${{ inputs.repo-token }}
      with:
        github-token: ${{ inputs.repo-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- payloadguard-report -->';
          const reportPath = process.env.REPORT_PATH;
          let body;
          try {
            body = marker + '\n' + fs.readFileSync(reportPath, 'utf8');
          } catch (e) {
            body = marker + '\n## ❌ PayloadGuard — Report not generated\n\n`' + String(e) + '`';
          }
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
          });
          const existing = comments.find(c => c.body.startsWith(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
          }

    - name: Auto-remediate mutable action tags
      if: inputs.auto-remediate == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.repo-token }}
        JSON_REPORT_PATH: ${{ steps.scan.outputs.json_report_path }}
        PR_BASE_BRANCH: ${{ github.base_ref }}
        REPO_FULL_NAME: ${{ github.repository }}
      run: python "${{ github.action_path }}/remediate.py"

    - name: Post Check Run
      if: always()
      shell: bash
      env:
        PAYLOADGUARD_APP_ID: ${{ inputs.app-id }}
        PAYLOADGUARD_PRIVATE_KEY: ${{ inputs.private-key }}
        PAYLOADGUARD_INSTALLATION_ID: ${{ inputs.installation-id }}
        PAYLOADGUARD_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
        PAYLOADGUARD_REPORT_PATH: ${{ steps.scan.outputs.report_path }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: python "${{ github.action_path }}/post_check_run.py"
